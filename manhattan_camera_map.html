<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Manhattan DOT Camera Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    color-scheme: light dark;
    --surface: #fcfcfb; --page: #f2f2ef; --text: #0b0b0b; --text-2: #52514e; --muted: #898781;
    --border: rgba(11,11,11,0.14); --blue: #2a78d6; --good: #0ca30c;
  }
  @media (prefers-color-scheme: dark) {
    :root { --surface: #1a1a19; --page: #0d0d0d; --text: #ffffff; --text-2: #c3c2b7; --muted: #898781; --border: rgba(255,255,255,0.16); --blue: #3987e5; --good: #0ca30c; }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--page); color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex; flex-direction: column;
  }
  header {
    padding: 14px 18px; border-bottom: 1px solid var(--border); background: var(--surface);
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
  }
  header h1 { font-size: 16px; margin: 0; }
  header .sub { font-size: 12px; color: var(--text-2); }
  .main { flex: 1; display: flex; min-height: 0; }
  #map { flex: 1; min-width: 0; }
  .panel {
    width: 360px; flex: none; background: var(--surface); border-left: 1px solid var(--border);
    padding: 16px; overflow-y: auto;
  }
  @media (max-width: 760px) {
    .main { flex-direction: column; }
    .panel { width: 100%; border-left: none; border-top: 1px solid var(--border); max-height: 46vh; }
  }
  .placeholder { color: var(--muted); font-size: 13px; line-height: 1.6; padding-top: 20px; }
  .cam-name { font-size: 14.5px; font-weight: 600; margin-bottom: 2px; }
  .dir-tag {
    font-size: 10.5px; font-weight: 600; color: var(--blue); background: color-mix(in srgb, var(--blue) 14%, transparent);
    padding: 2px 7px; border-radius: 999px; margin-left: 4px; vertical-align: middle;
  }
  .cam-coords { font-size: 11.5px; color: var(--muted); margin-bottom: 12px; }
  .frame { position: relative; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); background: #000; aspect-ratio: 16/9; }
  .frame img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .frame .badge {
    position: absolute; top: 8px; left: 8px; font-size: 10.5px; background: rgba(11,11,11,0.65); color: #fff;
    padding: 3px 8px; border-radius: 999px; display: flex; align-items: center; gap: 5px;
  }
  .frame .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--good); }
  .row-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .fetched-at { font-size: 11.5px; color: var(--muted); }
  button {
    font-family: inherit; font-size: 12.5px; padding: 7px 12px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--page); color: var(--text); cursor: pointer;
  }
  button.primary { background: var(--blue); color: #fff; border-color: var(--blue); font-weight: 600; }
  label.auto { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-2); margin-top: 10px; }
  .leaflet-container { background: var(--page); }
  .layer-toggle { display: flex; align-items: center; gap: 14px; font-size: 12.5px; color: var(--text-2); margin-left: auto; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .legend-row { display: flex; align-items: center; gap: 5px; }

  .resize-handle {
    width: 6px; flex: none; cursor: ew-resize; background: transparent; position: relative;
  }
  .resize-handle::after {
    content: ''; position: absolute; top: 0; bottom: 0; left: 2px; width: 2px; background: var(--border);
  }
  .resize-handle:hover::after, .resize-handle.dragging::after { background: var(--blue); width: 3px; left: 1.5px; }

  .frame .expand-btn {
    position: absolute; top: 8px; right: 8px; z-index: 5; width: 26px; height: 26px; border-radius: 6px;
    background: rgba(11,11,11,0.6); color: #fff; border: none; cursor: pointer; font-size: 14px; line-height: 1;
    display: flex; align-items: center; justify-content: center; padding: 0;
  }
  .frame .expand-btn:hover { background: rgba(11,11,11,0.85); }

  .lightbox {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 1000;
    align-items: center; justify-content: center;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 92vw; max-height: 92vh; object-fit: contain; border-radius: 8px; }
  .lightbox-close {
    position: absolute; top: 20px; right: 24px; width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.12); color: #fff; border: none; cursor: pointer; font-size: 18px;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.22); }
</style>
</head>
<body>
<header>
  <h1>Manhattan DOT Camera Map</h1>
  <span class="sub" id="countLabel">Loading cameras…</span>
  <div class="layer-toggle">
    <label class="legend-row"><input type="checkbox" id="toggleStreetCondition" checked /> <span class="legend-dot" style="background:#eb6834"></span>Street Condition</label>
    <label class="legend-row"><input type="checkbox" id="toggleStreetLight" checked /> <span class="legend-dot" style="background:#eda100"></span>Street Light Condition</label>
  </div>
</header>
<div class="main">
  <div id="map"></div>
  <div class="resize-handle" id="resizeHandle" title="Drag to resize"></div>
  <div class="panel" id="panel">
    <div class="placeholder">Click any camera dot on the map to load its current live frame.</div>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose" title="Close (Esc)">✕</button>
  <img id="lightboxImg" alt="Camera feed, maximized" />
</div>

  var dirName = { N: 'North', NE: 'Northeast', E: 'East', SE: 'Southeast', S: 'South', SW: 'Southwest', W: 'West', NW: 'Northwest' };

  function markerStyle(active) {
    return {
      radius: active ? 8 : 5,
      color: active ? '#e34948' : '#2a78d6',
      weight: active ? 2 : 1,
      fillColor: active ? '#e34948' : '#2a78d6',
      fillOpacity: 0.75
    };
  }

  function arrowIcon(direction, active, source) {
    var color = active ? '#e34948' : '#2a78d6';
    var angle = dirAngle[direction];
    var dashed = source === 'dino' ? ' stroke-dasharray="2,1.4"' : '';
    var opacity = source === 'dino' ? 0.6 : 1;
    var svg =
      '<svg width="20" height="20" viewBox="0 0 20 20" style="transform:rotate(' + angle + 'deg); opacity:' + opacity + ';">' +
      '<path d="M10 1 L17 17 L10 13 L3 17 Z" fill="' + color + '" stroke="white" stroke-width="1.2" stroke-linejoin="round"' + dashed + '/>' +
      '</svg>';
    return L.divIcon({ className: 'dir-icon', html: svg, iconSize: [20, 20], iconAnchor: [10, 10] });
  }

  function setMarkerActive(id, active) {
    var entry = markers[id];
    if (entry.direction) entry.layer.setIcon(arrowIcon(entry.direction, active, entry.source));
    else entry.layer.setStyle(markerStyle(active));
  }

  manhattanCams.forEach(function (cam) {
    var dirInfo = camDirections[cam.id]; // { dir, source, score? } or undefined
    var direction = dirInfo && dirInfo.dir;
    var source = dirInfo && dirInfo.source;
    var m;
    if (direction) {
      m = L.marker([cam.latitude, cam.longitude], { icon: arrowIcon(direction, false, source) });
    } else {
      m = L.circleMarker([cam.latitude, cam.longitude], markerStyle(false));
    }
    m.addTo(map);
    var sourceTag = source === 'dino' ? ' (visual match, sim=' + dirInfo.score + ')' : source === 'ocr' ? ' (from camera text)' : '';
    var tip = cam.name + (direction ? ' — facing ' + dirName[direction] + sourceTag : '');
    m.bindTooltip(tip, { direction: 'top', offset: [0, -4] });
    m.on('click', function () { selectCamera(cam.id); });
    markers[cam.id] = { layer: m, direction: direction, source: source };
  });

  var ocrCount = Object.values(camDirections).filter(function (d) { return d.source === 'ocr'; }).length;

  var lightboxImg = document.getElementById('lightboxImg');

  function loadFrame(cam, imgEl, metaEl) {

  }

  function openLightbox() {
    document.getElementById('lightbox').classList.add('open');

    document.getElementById('lightbox').classList.remove('open');

  function selectCamera(id) {
    if (selectedId && markers[selectedId]) setMarkerActive(selectedId, false);

    var cam = manhattanCams.find(function (c) { return c.id === id; });
    var dirInfo = camDirections[id];
    var direction = dirInfo && dirInfo.dir;
    var sourceTag = dirInfo && (dirInfo.source === 'dino' ? ' (visual match, sim=' + dirInfo.score + ')' : ' (from camera text)');
    var panel = document.getElementById('panel');
    panel.innerHTML =
      '<div class="cam-name">' + cam.name + (direction ? ' <span class="dir-tag">facing ' + dirName[direction] + sourceTag + '</span>' : '') + '</div>' +
      '<div class="cam-coords">' + cam.latitude.toFixed(5) + ', ' + cam.longitude.toFixed(5) + (direction ? '' : ' · no direction label on this camera') + '</div>' +

      '<label class="auto"><input type="checkbox" id="autoFrame" /> Auto-refresh every 5s</label>';

    var img = panel.querySelector('img');
    var meta = document.getElementById('fetchedAt');
    var refreshBtn = document.getElementById('refreshFrameBtn');
    var autoBox = document.getElementById('autoFrame');
    var expandBtn = document.getElementById('expandBtn');

    loadFrame(cam, img, meta);
    refreshBtn.addEventListener('click', function () { loadFrame(cam, img, meta); });
    expandBtn.addEventListener('click', openLightbox);
    autoBox.addEventListener('change', function () {
      if (autoBox.checked) autoTimer = setInterval(function () { loadFrame(cam, img, meta); }, 5000);
      else { clearInterval(autoTimer); autoTimer = null; }
    });

    map.panTo([cam.latitude, cam.longitude]);
  }

    panelEl.style.width = newWidth + 'px';

  document.addEventListener('mouseup', function () {
    if (!resizing) return;
    resizing = false;

  });

  var complaintColor = { 'Street Condition': '#eb6834', 'Street Light Condition': '#eda100' };
  var streetConditionLayer = L.layerGroup();
  var streetLightLayer = L.layerGroup();
  var layerByType = { 'Street Condition': streetConditionLayer, 'Street Light Condition': streetLightLayer };

  streetComplaints.forEach(function (c) {
    if (!c.lat || !c.lon) return;
    var dot = L.circleMarker([c.lat, c.lon], {
      radius: 4,
      color: complaintColor[c.type] || '#898781',
      weight: 1,
      fillColor: complaintColor[c.type] || '#898781',
      fillOpacity: 0.55
    });
    var ageDays = Math.round((Date.now() - new Date(c.date + 'Z').getTime()) / 86400000);
    dot.bindTooltip(
      c.type + (c.descriptor ? ' — ' + c.descriptor : '') + '<br>' +
      (c.addr || 'address unavailable') + '<br>' +
      ageDays + ' day' + (ageDays === 1 ? '' : 's') + ' ago',
      { direction: 'top', offset: [0, -4] }
    );
    var layer = layerByType[c.type];
    if (layer) layer.addLayer(dot);
  });
  streetConditionLayer.addTo(map);
  streetLightLayer.addTo(map);

  document.getElementById('toggleStreetCondition').addEventListener('change', function (e) {
    if (e.target.checked) streetConditionLayer.addTo(map);
    else map.removeLayer(streetConditionLayer);
  });
  document.getElementById('toggleStreetLight').addEventListener('change', function (e) {
    if (e.target.checked) streetLightLayer.addTo(map);
    else map.removeLayer(streetLightLayer);
  });

  console.log('Street/Street Light complaints plotted:', streetComplaints.length);
